model_name: ???          # HF model name OR 'tiny_recursive' for custom model
task_name: ???           # tasks joined with '+', e.g. 'NER+FPB'
model_type: huggingface  # 'huggingface' | 'custom'
vocab_size: 50000        # vocabulary size (50000 for tiny_recursive + GPT-2 tokenizer)

# Path to a trained TinyRecursiveModel checkpoint (.pt file).
# Set to null when using a HuggingFace model (model_type=huggingface).
checkpoint_path: null

# Architecture fields — must match the values used during training
# (only used when model_type=custom)
dim: 256
n_heads: 4
n_layers: 2
n_latent_recursions: 3
n_improvement_cycles: 2
tokenizer_name: ${model_name} # override tokenizer source when using a custom model
output_dir: /tmp/output # for saving the prediction files
res_dir: /tmp/res # for saving the evaluation scores of each task
local_output_dir: . # local path to copy outputs (useful when running on a remote machine)
max_length: 1024 # max length of tokenizer
generate_max_len: 100 # for text completion task
n_tokens: 1024 # max length of (prompt + task input+ task output)
cache_dir: /tmp/cache # for caching hf models and datasets
add_bos_token: ???
model_parallel: ??? # True or false

dataset_reader:
  _target_: src.dataset_readers.inference_dsr.InferenceDatasetReader
  model_name: ${model_name}
  task_name: ${task_name}
  n_tokens: ${n_tokens}
  cache_dir: ${cache_dir}
  max_length: ${max_length}
  generate_max_len: ${generate_max_len}
  add_bos_token: ${add_bos_token}
model:
  _target_: src.models.model.get_model_by_name
  model_name: ${model_name}
  model_type: ${model_type}
  vocab_size: ${vocab_size}
  max_seq_len: ${n_tokens}
  cache_dir: ${cache_dir}
  trust_remote_code: true
  model_parallel: ${model_parallel}
  checkpoint_path: ${checkpoint_path}
  dim: ${dim}
  n_heads: ${n_heads}
  n_layers: ${n_layers}
  n_latent_recursions: ${n_latent_recursions}
  n_improvement_cycles: ${n_improvement_cycles}